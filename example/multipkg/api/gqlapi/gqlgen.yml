schema:
  - schema.graphql

exec:
  package: exec
  filename: exec/exec.go

# Bind directly to the protoc-gen-go types; do NOT generate a second model set.
autobind:
  - github.com/gopherex/protoc-gen-go-graphql/example/multipkg/api
  - github.com/gopherex/protoc-gen-go-graphql/example/multipkg/models

models:
  GetWidgetRequest:    { model: github.com/gopherex/protoc-gen-go-graphql/example/multipkg/api.GetWidgetRequest }
  GetWidgetResponse:    { model: github.com/gopherex/protoc-gen-go-graphql/example/multipkg/api.GetWidgetResponse }
  Widget:    { model: github.com/gopherex/protoc-gen-go-graphql/example/multipkg/models.Widget }

# No `resolver:` block on purpose: gqlgen then emits only the exec engine and the
# resolver INTERFACES (no stub files). The generator owns the resolver
# implementation that satisfies those interfaces and delegates to gRPC.

