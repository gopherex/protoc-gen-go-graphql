name: CI

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_call: # reused by release.yml to gate releases on a green build

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast checks against the committed source + generated example output.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt needed:"; echo "$out"; exit 1
          fi
      - name: go vet
        run: go vet ./generator/ ./graphqlrt/
      - name: go build
        run: go build ./...
      - name: go test -race
        run: go test -race ./...

  # Verifies the single-pass generation pipeline and that the committed schema.go
  # output is current.
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: build plugins
        run: |
          make build
          echo "$PWD/bin" >> "$GITHUB_PATH"
      - name: regenerate and check committed schema.go is current
        run: |
          make gen-test
          # Only diff the generated graphql-go schema.go (deterministic). The
          # *.pb.go carry a protoc version stamp that varies by toolchain.
          git diff --exit-code -- '**/gqlapi/schema.go' || {
            echo "::error::generated gqlapi/schema.go is stale; run 'make gen-test' and commit"; exit 1; }
      - name: generated output builds
        run: go build ./...
