  fieldInt32: Int!
  fieldInt64: Int64!
  fieldUint32: Int! @goField(forceResolver: true)
  fieldUint64: Uint64!
  fieldSint32: Int!
  fieldSint64: Int64!
  fieldFixed32: Int! @goField(forceResolver: true)
  fieldFixed64: Uint64!
  fieldSfixed32: Int!
  fieldSfixed64: Int64!
  fieldBool: Boolean!
  fieldString: String!
  fieldBytes: Bytes!
}
