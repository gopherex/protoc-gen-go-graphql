  fieldDouble: Float
  fieldFloat: Float @goField(forceResolver: true)
  fieldInt32: Int
  fieldInt64: Int64
  fieldUint32: Int @goField(forceResolver: true)
  fieldUint64: Uint64
  fieldBool: Boolean
  fieldString: String
  fieldBytes: Bytes
}
type RepeatedScalars {
  fieldDouble: [Float!]!
  fieldFloat: [Float!]! @goField(forceResolver: true)
  fieldInt32: [Int!]!
  fieldInt64: [Int64!]!
  fieldUint64: [Uint64!]!
  fieldBool: [Boolean!]!
  fieldString: [String!]!
  fieldBytes: [Bytes!]!
}
type Outer {
  inner: Outer_Inner
  tag: String!
}
type Outer_Inner {
  label: String!
